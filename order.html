<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creamella Order</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-weight: bold;
    font-size: 18px;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
}

.order-btn {
    background: #6b4226;
    color: white;
    padding: 6px 15px;
    border-radius: 20px;
}

.title {
    text-align: center;
    margin: 30px 0;
}

.title h1 {
    font-size: 40px;
}

.title span {
    color: #c47a2c;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 20px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 10px;
}

.place-btn {
    width: 100%;
    padding: 12px;
    background: #6b4226;
    color: white;
    border: none;
    border-radius: 20px;
    margin-top: 15px;
    cursor: pointer;
}


</style>

</head>

<body>

<header>
    <div class="logo">☕ Creamella</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="coffee.html">Gallery</a>
        <a href="order.html" class="order-btn">Order</a>
    </nav>
</header>

<div class="title">
    <h1>Complete Your <span>Order</span></h1>
    <p>Review your selections and provide delivery details</p>
</div>

<div class="container">


    <div class="card">
        <h2>🛍 Your order</h2>
        <p>0 items in your cart</p>
        <p>Your cart is empty. <a href="#">Browse our gallery</a> to add items.</p>
    </div>


    <div class="card">
        <h2>Delivery Information</h2>
        <p>Please provide your delivery details</p>

        <input type="text" placeholder="Full name">
        <input type="text" placeholder="Complete Address">
        <input type="text" placeholder="Phone Number">

        <div class="row">
            <input type="date">
            <input type="time">
        </div>

        <p><b>Payment Method</b></p>
        <label><input type="radio" name="payment"> GCash</label><br>
        <label><input type="radio" name="payment"> Cash on delivery</label>

        <button class="place-btn" onclick="placeOrder()">Place Order - ₱0</button>
    </div>

</div>

 <script>
function placeOrder() {
    alert("Order placed successfully! ☕");
}
</script>
